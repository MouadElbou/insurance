name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "9"

jobs:
  # ─── Install & Cache ────────────────────────────────────────────
  install:
    name: Install Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

  # ─── Lint ────────────────────────────────────────────────────────
  lint:
    name: Lint
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm lint

  # ─── Type Check ──────────────────────────────────────────────────
  typecheck:
    name: Type Check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # Shared must be built before backend/desktop can typecheck
      - run: pnpm --filter @insurance/shared build
      - run: pnpm --filter backend exec prisma generate
      - run: pnpm -r typecheck

  # ─── Test ────────────────────────────────────────────────────────
  test:
    name: Test
    needs: install
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: insurance_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://test:test@localhost:5432/insurance_test?schema=public"
      JWT_SECRET: "test-jwt-secret-that-is-at-least-32-characters-long"
      JWT_REFRESH_SECRET: "test-jwt-refresh-secret-that-is-also-32-chars"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm --filter @insurance/shared build
      - run: pnpm --filter backend exec prisma generate
      - run: pnpm --filter backend exec prisma migrate deploy
      - run: pnpm -r test

  # ─── Security Audit ──────────────────────────────────────────────
  audit:
    name: Security Audit
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      # Mirrors the `audit:prod` script — production dependency graph only.
      # Transient dev-tool vulnerabilities should not fail CI.
      - run: pnpm audit --prod --audit-level=high
        continue-on-error: true

  # ─── Build ───────────────────────────────────────────────────────
  build:
    name: Build
    needs: [lint, typecheck, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: deps-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}

      - run: pnpm --filter @insurance/shared build
      - run: pnpm --filter backend exec prisma generate
      - run: pnpm --filter backend build

  # ─── Docker Build (main branch only) ────────────────────────────
  docker:
    name: Docker Build
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t insurance-backend -f apps/backend/Dockerfile .

      - name: Verify container starts
        run: |
          docker run -d --name test-backend \
            -e DATABASE_URL="postgresql://fake:fake@localhost:5432/fake" \
            -e JWT_SECRET="ci-test-secret-that-is-at-least-32-characters" \
            -e JWT_REFRESH_SECRET="ci-test-refresh-secret-at-least-32-chars" \
            -e NODE_ENV=production \
            -p 3001:3001 \
            insurance-backend
          sleep 5
          docker logs test-backend
          docker rm -f test-backend
