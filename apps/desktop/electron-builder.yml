appId: com.insurance-tracker.app
productName: Insurance Tracker
copyright: Copyright © 2026
directories:
  output: release
  buildResources: build
files:
  - dist
  - dist-electron
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Insurance Tracker
publish:
  provider: github
  owner: ""
  repo: ""
